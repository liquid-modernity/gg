<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Yellow Cart · PakRPP</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://www.pakrpp.com/store" />
  <meta http-equiv="refresh" content="0;url=/store" />
  <script>
    (function () {
      var next = '/store' + (window.location.search || '') + (window.location.hash || '');
      window.location.replace(next);
    }());
  </script>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    }
    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f4eeef;
      color: #201a1c;
    }
    main {
      width: min(100%, 34rem);
      padding: 24px;
      border: 1px solid rgba(32, 26, 28, 0.12);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 20px 60px rgba(32, 26, 28, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }
    p {
      margin: 0 0 14px;
      font: 500 1rem/1.6 system-ui, sans-serif;
      color: rgba(32, 26, 28, 0.78);
    }
    a {
      color: inherit;
      font: 700 0.95rem/1.2 system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <main>
    <h1>Store moved to <a href="/store">/store</a>.</h1>
    <p>This legacy Yellow Cart path now redirects to the canonical Store route.</p>
  </main>
</body>
</html>
