<nav aria-label='Breadcrumb' class='gg-post__breadcrumbs'>

    <!-- HOME = /landing -->
    <a aria-label='Home' class='gg-post__breadcrumbs-link gg-post__breadcrumbs-link--home' expr:href='data:blog.homepageUrl + &quot;landing&quot;'>
      <span aria-hidden='true' class='gg-icon gg-icon--sm material-symbols-rounded'>home_app_logo</span>
      <span class='gg-post__breadcrumbs-label'>Home</span>
    </a>

    <!-- POST MODE -->
    <b:if cond='data:view.isPost'>
      <span aria-hidden='true' class='gg-icon gg-icon--sm material-symbols-rounded gg-post__breadcrumbs-sep'>chevron_right</span>

      <!-- BLOG = / -->
      <a class='gg-post__breadcrumbs-link' expr:href='&quot;/&quot;'>
        <span aria-hidden='true' class='gg-icon gg-icon--sm material-symbols-rounded'>newsmode</span>
        <span class='gg-post__breadcrumbs-label'>Blog</span>
      </a>

      <!-- FIRST LABEL (optional) -->
      <b:if cond='data:post.labels'>
        <b:loop index='i' values='data:post.labels' var='lab'>
          <b:if cond='data:i == 0'>
            <span aria-hidden='true' class='gg-icon gg-icon--sm material-symbols-rounded gg-post__breadcrumbs-sep'>chevron_right</span>
            <a class='gg-post__breadcrumbs-link' expr:href='data:lab.url'>
              <span aria-hidden='true' class='gg-icon gg-icon--sm material-symbols-rounded'>folder_open</span>
              <span class='gg-post__breadcrumbs-label'><b:eval expr='data:lab.name'/></span>
            </a>
          </b:if>
        </b:loop>
      </b:if>

      <!-- CURRENT POST -->
      <span aria-hidden='true' class='gg-icon gg-icon--sm material-symbols-rounded gg-post__breadcrumbs-sep'>chevron_right</span>
      <span aria-hidden='true' class='gg-icon gg-icon--sm material-symbols-rounded'>article</span>
      <span aria-current='page' class='gg-post__breadcrumbs-current'>
        <data:post.title/>
      </span>
    </b:if>

    <!-- PAGE MODE -->
    <b:if cond='data:view.isPage and not data:ggIsSystemPage'>
      <span aria-hidden='true' class='gg-icon gg-icon--sm material-symbols-rounded gg-post__breadcrumbs-sep'>chevron_right</span>
      <span aria-current='page' class='gg-post__breadcrumbs-current'>
        <data:post.title/>
      </span>
    </b:if>

  </nav>
