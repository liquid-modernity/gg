<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tags Directory</title>
  </head>
  <body>
    <main id="gg-main">
      <h1>Tags Directory</h1>

      <script id="gg-tags-dir" type="application/json">
{
  "v": 1,
  "tags": {
    "seo": { "name": "SEO" },
    "blogger": { "name": "Blogger" },
    "pwa": { "name": "PWA" },
    "cloudflare": { "name": "Cloudflare" },
    "javascript": { "name": "JavaScript" }
  }
}
      </script>

      <section aria-label="Tags Directory Fallback">
        <h2>Tags</h2>
        <ul id="gg-tags-dir-fallback">
          <li><a data-gg-tag="seo" href="/p/tags.html?tag=seo">SEO</a></li>
          <li><a data-gg-tag="blogger" href="/p/tags.html?tag=blogger">Blogger</a></li>
          <li><a data-gg-tag="pwa" href="/p/tags.html?tag=pwa">PWA</a></li>
          <li><a data-gg-tag="cloudflare" href="/p/tags.html?tag=cloudflare">Cloudflare</a></li>
          <li><a data-gg-tag="javascript" href="/p/tags.html?tag=javascript">JavaScript</a></li>
        </ul>
      </section>
      
       <section class='gg-tags-page'>
            <header class='gg-tags-page__head'>
              <h2 class='gg-tags-page__title' data-gg-copy='nav.tags'>Tags</h2>
              <p class='gg-tags-page__description' data-gg-copy='special.tags.description'>Browse articles by topic.</p>
            </header>

            <div class='gg-tags-page__controls'>
              <label class='gg-tags-page__sort-label' data-gg-copy='special.tags.sort' for='ggTagsSort'>Sort</label>
              <select class='gg-tags-page__sort' id='ggTagsSort'>
                <option data-gg-copy='special.tags.sort.newest' value='newest'>Newest</option>
                <option data-gg-copy='special.tags.sort.oldest' value='oldest'>Oldest</option>
              </select>
            </div>

            <section class='gg-tags-page__results'>
              <div class='gg-post-list' data-gg-state='loading'/>
            </section>

            <section class='gg-tags-page__directory'>
              <div class='gg-tags-directory'/>
            </section>
          </section>
      
      
    </main>
  </body>
</html>
