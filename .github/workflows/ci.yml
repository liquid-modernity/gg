name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Run Store and Cloudflare CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: '1'
      STORE_CI: '1'
      GG_STORE_MODE: ci
      STORE_REQUIRE_LIVE_FEED: '0'
      STORE_STRICT_IMAGES: '0'
      GG_LIVE_ALLOW_GLOBAL_TIMEOUT_WARN: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show repository root
        run: |
          pwd
          ls -la

      - name: Build project artifacts
        run: npm run build

      - name: Run aggregate QA guards
        run: npm run ci:qa

      - name: Run Store and Cloudflare CI checks
        run: npm run ci:cloudflare

      - name: Verify generated Blogger app artifacts
        run: |
          test -f __gg/assets/css/gg-app.dev.css
          test -f __gg/assets/js/gg-app.dev.js
          test -f dist/assets/css/gg-app.dev.css
          test -f dist/assets/js/gg-app.dev.js
          test -f dist/blogger-template.publish.xml

      - name: Verify root Store artifacts
        run: |
          test -f store.html
          test -f store/data/manifest.json
          test -f store/data/build-report.json
          test -f store/fashion/index.html
          test -f store/skincare/index.html
          test -f store/workspace/index.html
          test -f store/tech/index.html
          test -f store/everyday/index.html
          test -f assets/store/store-core.js
          test -f assets/store/store-discovery.js
          test -f assets/store/store.js
          test -f assets/store/store.css

      - name: Verify Cloudflare prepared bundle
        run: |
          test -f .cloudflare-build/worker.js
          test -f .cloudflare-build/public/store.html
          test -f .cloudflare-build/public/store/data/manifest.json
          test -f .cloudflare-build/public/store/data/build-report.json
          test -f .cloudflare-build/public/assets/store/store-core.js
          test -f .cloudflare-build/public/assets/store/store-discovery.js
          test -f .cloudflare-build/public/assets/store/store.js
          test -f .cloudflare-build/public/assets/store/store.css

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          if-no-files-found: ignore
          path: |
            dist/
            .cloudflare-build/
            store/data/build-report.json
            store/data/manifest.json
