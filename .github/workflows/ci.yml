name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gaga-preflight-and-dry-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build Blogger publish artifact
        run: npm run gaga:template:pack

      - name: CI scope truth
        run: |
          echo "CI scope: lightweight preflight + Worker deployability checks."
          echo "CI does not publish Blogger template/theme."
          {
            echo "### CI Scope Truth"
            echo "- This CI runs gaga preflight (worker syntax + template fingerprint contract)."
            echo "- This CI runs Wrangler dry-run via npm run gaga:cf:dry."
            echo "- This CI does **not** publish Blogger template/theme."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Lightweight preflight
        run: npm run gaga:preflight

      - name: Cloudflare deploy dry run
        run: npm run gaga:cf:dry
