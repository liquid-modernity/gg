name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Run Store and Cloudflare CI checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: '1'
      STORE_CI: '1'
      GG_STORE_MODE: ci
      STORE_REQUIRE_LIVE_FEED: '0'
      STORE_STRICT_IMAGES: '0'
      GG_LIVE_ALLOW_GLOBAL_TIMEOUT_WARN: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Store and Cloudflare CI checks
        run: npm run ci:cloudflare

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          if-no-files-found: ignore
          path: |
            dist/
            .cloudflare-build/
            store/data/build-report.json
            store/data/manifest.json
