name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Guard lockfile
        run: |
          set -euo pipefail
          if [ ! -f package-lock.json ]; then
            echo "ERROR: package-lock.json is required."
            exit 1
          fi

      - name: Install deps
        run: npm ci

      - name: Build release artifacts
        run: npm run build

      - name: Verify P0 (blocking)
        run: npm run verify:p0

      - name: Verify P1 (runtime quality)
        run: npm run verify:p1

      - name: Verify P2 (reference)
        run: npm run verify:p2

      - name: Verify build determinism
        run: |
          set -euo pipefail
          if ! git diff --exit-code; then
            echo "Build produced changes. Run npm run build locally and commit generated artifacts."
            exit 1
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "Build produced changes. Run npm run build locally and commit generated artifacts."
            git status --porcelain
            exit 1
          fi
