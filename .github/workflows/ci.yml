name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gaga-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Wrangler CLI (pinned)
        run: npm install --no-save wrangler@4.61.1

      - name: Worker syntax check
        run: node --check src/worker.js

      - name: Cloudflare deploy dry run
        run: npm run gaga:dry
