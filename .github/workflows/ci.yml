name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify GG vNext
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: '1'
      CONSOLE_MODE: local
      STUDIO_MODE: local

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vNext validation pipeline
        run: |
          npm run doctor
          npm run build
          npm run check
          npm run check:softcode
          npm run check:public-softcode
          npm run console:check
          npm run studio:check
          npm run deploy:dry

      - name: Upload CI diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          if-no-files-found: ignore
          path: |
            dist/
            .cloudflare-build/
            npm-debug.log*
            /home/runner/.npm/_logs/
