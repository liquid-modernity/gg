name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gaga-dry-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build Blogger publish artifact
        run: npm run gaga:template:pack

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Template fingerprint contract
        run: node qa/template-fingerprint.mjs --check

      - name: Install Wrangler CLI (pinned)
        run: npm install --no-save wrangler@4.61.1

      - name: CI scope truth
        run: |
          echo "CI scope: Worker deployability checks only (Wrangler dry-run)."
          echo "CI does not publish Blogger template/theme."
          {
            echo "### CI Scope Truth"
            echo "- This CI validates Worker syntax + Wrangler dry-run."
            echo "- This CI does **not** publish Blogger template/theme."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Worker syntax check
        run: node --check src/worker.js

      - name: Cloudflare deploy dry run
        run: npm run gaga:dry
