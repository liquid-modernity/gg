name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  GG_LIVE_BASE_URL: https://www.pakrpp.com
  GG_LIVE_RETRIES: '4'
  GG_LIVE_RETRY_DELAY_SECONDS: '5'
  GG_LIVE_TIMEOUT_SECONDS: '30'
  GG_LIVE_CONNECT_TIMEOUT_SECONDS: '15'
  GG_LIVE_ALLOW_GLOBAL_TIMEOUT_WARN: '0'

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Verify before deploy, deploy, and live-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: '1'
      STORE_CI: '1'
      GG_STORE_MODE: ci
      STORE_REQUIRE_LIVE_FEED: '0'
      STORE_STRICT_IMAGES: '0'
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify before deploy
        run: npm run ci:cloudflare

      - name: Deploy to Cloudflare Workers
        run: npm run deploy:cloudflare:prepared

      - name: Live smoke test
        run: npm run gaga:verify-worker-live:strict

      - name: Upload deploy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deploy-diagnostics
          if-no-files-found: ignore
          path: |
            dist/
            .cloudflare-build/
            store/data/build-report.json
            store/data/manifest.json
