name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy GG vNext
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: '1'
      CONSOLE_MODE: production
      STUDIO_MODE: production
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run pre-deploy validation
        run: |
          npm run doctor
          npm run build
          npm run check
          npm run check:softcode
          npm run check:public-softcode
          npm run console:check
          npm run studio:check
          npm run deploy:dry

      - name: Verify Cloudflare secrets
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID" && exit 1)

      - name: Deploy to Cloudflare Workers
        run: npm run deploy

      - name: Upload deploy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deploy-diagnostics
          if-no-files-found: ignore
          path: |
            dist/
            .cloudflare-build/
            npm-debug.log*
            /home/runner/.npm/_logs/
