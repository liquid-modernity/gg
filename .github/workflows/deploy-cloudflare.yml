name: Deploy to Cloudflare

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build assets
        run: npm run build
      
      - name: Run audit
        run: npm run audit
      
      - name: Deploy to Cloudflare Workers
        run: npm run deploy:workers
        env:
          WRANGLER_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      
      - name: Purge Cloudflare cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ env.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ env.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://your-domain.com/*"]}'
      
      - name: Generate audit zip
        run: |
          mkdir -p audit-report
          cp qa/gaga-audit.mjs audit-report/
          zip -r audit-report-${{ github.run_number }}.zip audit-report
      
      - name: Upload audit artifact
        uses: actions/upload-artifact@v3
        with:
          name: audit-report
          path: audit-report-${{ github.run_number }}.zip
          retention-days: 30
      
      - name: Create Release with Audit
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: audit-report-${{ github.run_number }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
