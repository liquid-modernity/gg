name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GG_LIVE_BASE_URL: ${{ vars.GG_LIVE_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Production branch guard
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error title=Production deploy guard::workflow_dispatch must run from main. Current ref: ${GITHUB_REF}."
            exit 1
          fi

      - name: Use Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Resolve live base URL
        run: |
          echo "GG_LIVE_BASE_URL=${GG_LIVE_BASE_URL:-https://www.pakrpp.com}" >> "$GITHUB_ENV"

      - name: Validate deploy config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=0

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error title=Missing GitHub secret::Set CLOUDFLARE_API_TOKEN before running deploy."
            missing=1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error title=Missing GitHub secret::Set CLOUDFLARE_ACCOUNT_ID before running deploy."
            missing=1
          fi

          {
            echo "### Deploy Config"
            echo "- CLOUDFLARE_API_TOKEN configured: \`$([ -n "${CLOUDFLARE_API_TOKEN:-}" ] && echo yes || echo no)\`"
            echo "- CLOUDFLARE_ACCOUNT_ID configured: \`$([ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && echo yes || echo no)\`"
            echo "- GG_LIVE_BASE_URL: \`${GG_LIVE_BASE_URL}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy scope truth
        run: |
          {
            echo "### Deploy Scope Truth"
            echo "- GitHub Actions handles Cloudflare Worker/assets deployment."
            echo "- Local machine stays edit, small npm scripts, Chrome DevTools, commit, and push."
            echo "- This workflow deploys Cloudflare Worker/assets only."
            echo "- This workflow does **not** publish Blogger template."
            echo "- This workflow does **not** run Playwright or full browser smoke."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build/proof Yellow Cart store
        run: npm run store:check:ci

      - name: Verify store split assets
        run: |
          set -euo pipefail
          test -f store.html
          test -f assets/store/store.css
          test -f assets/store/store.js
          grep -Eq '<link[^>]+href="/assets/store/store\.css"' store.html
          grep -Eq '<script[^>]+src="/assets/store/store\.js"[^>]*defer' store.html

      - name: Summarize store build report
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import { readFileSync } from "node:fs";
          const report = JSON.parse(readFileSync("dist/store-build-report.json", "utf8"));
          const categorySummary = Object.entries(report.categoryCounts || {}).map(([key, value]) => `${key}:${value}`).join(", ") || "none";
          const imageSummary = Object.entries(report.imageSourceSummary || {}).map(([key, value]) => `${key}:${value}`).join(", ") || "none";
          const warnings = Array.isArray(report.warnings) ? report.warnings : [];
          console.log("### Store Build Report");
          console.log(`- source: \`${report.source}\``);
          console.log(`- products: \`${report.products}\``);
          console.log(`- validProducts: \`${report.validProducts}\``);
          console.log(`- invalidProducts: \`${report.invalidProducts}\``);
          console.log(`- feedEntries: \`${report.feedEntries}\``);
          console.log(`- categoryCounts: \`${categorySummary}\``);
          console.log(`- imageSourceSummary: \`${imageSummary}\``);
          console.log(`- strict: \`${report.strict}\``);
          console.log(`- warnings: \`${warnings.length}\``);
          EOF

      - name: Upload store build report
        uses: actions/upload-artifact@v4
        with:
          name: store-build-report-deploy
          path: dist/store-build-report.json
          if-no-files-found: error

      - name: Build Blogger publish artifact
        run: npm run gaga:template:pack

      - name: Prepare Cloudflare public assets
        run: |
          set -euo pipefail

          mkdir -p .cloudflare-build/public/__gg/assets/css
          mkdir -p .cloudflare-build/public/__gg/assets/js

          if [ -f "dist/assets/css/gg-app.dev.css" ]; then
            cp dist/assets/css/gg-app.dev.css .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          elif [ -f "__gg/assets/css/gg-app.dev.css" ]; then
            cp __gg/assets/css/gg-app.dev.css .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          else
            echo "Missing gg-app.dev.css in dist/assets/css or __gg/assets/css" >&2
            exit 1
          fi

          if [ -f "dist/assets/js/gg-app.dev.js" ]; then
            cp dist/assets/js/gg-app.dev.js .cloudflare-build/public/__gg/assets/js/gg-app.dev.js
          elif [ -f "__gg/assets/js/gg-app.dev.js" ]; then
            cp __gg/assets/js/gg-app.dev.js .cloudflare-build/public/__gg/assets/js/gg-app.dev.js
          else
            echo "Missing gg-app.dev.js in dist/assets/js or __gg/assets/js" >&2
            exit 1
          fi

          if [ -f "__gg/flags.json" ]; then
            cp __gg/flags.json .cloudflare-build/public/__gg/flags.json
          elif [ -f "gg-flags.json" ]; then
            cp gg-flags.json .cloudflare-build/public/__gg/flags.json
          elif [ -f "registry/gg-flags.json" ]; then
            cp registry/gg-flags.json .cloudflare-build/public/__gg/flags.json
          fi

          test -s .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          test -s .cloudflare-build/public/__gg/assets/js/gg-app.dev.js

          ls -lh .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          ls -lh .cloudflare-build/public/__gg/assets/js/gg-app.dev.js

      - name: Verify extracted app asset wiring
        run: |
          set -euo pipefail
          test -f index.xml
          test -f .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          test -f .cloudflare-build/public/__gg/assets/js/gg-app.dev.js
          grep -Fq "/__gg/assets/css/gg-app.dev.css" index.xml
          grep -Fq "/__gg/assets/js/gg-app.dev.js" index.xml

      - name: Lightweight preflight
        run: npm run gaga:preflight

      - name: Build Worker/assets artifact
        run: npm run build

      - name: Re-prepare Cloudflare public assets after build
        run: |
          set -euo pipefail

          mkdir -p .cloudflare-build/public/__gg/assets/css
          mkdir -p .cloudflare-build/public/__gg/assets/js

          if [ -f "dist/assets/css/gg-app.dev.css" ]; then
            cp dist/assets/css/gg-app.dev.css .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          elif [ -f "__gg/assets/css/gg-app.dev.css" ]; then
            cp __gg/assets/css/gg-app.dev.css .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          else
            echo "Missing gg-app.dev.css after build" >&2
            exit 1
          fi

          if [ -f "dist/assets/js/gg-app.dev.js" ]; then
            cp dist/assets/js/gg-app.dev.js .cloudflare-build/public/__gg/assets/js/gg-app.dev.js
          elif [ -f "__gg/assets/js/gg-app.dev.js" ]; then
            cp __gg/assets/js/gg-app.dev.js .cloudflare-build/public/__gg/assets/js/gg-app.dev.js
          else
            echo "Missing gg-app.dev.js after build" >&2
            exit 1
          fi

          test -s .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          test -s .cloudflare-build/public/__gg/assets/js/gg-app.dev.js

          ls -lh .cloudflare-build/public/__gg/assets/css/gg-app.dev.css
          ls -lh .cloudflare-build/public/__gg/assets/js/gg-app.dev.js

      - name: Store artifact smoke
        run: npm run gaga:verify-store-artifact

      - name: Deploy Worker/assets to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run gaga:cf:deploy

      - name: Post-deploy live worker smoke
        env:
          GG_LIVE_BASE_URL: ${{ env.GG_LIVE_BASE_URL }}
          GG_LIVE_RETRIES: "3"
          GG_LIVE_TIMEOUT_SECONDS: "30"
          GG_LIVE_CONNECT_TIMEOUT_SECONDS: "15"
          GG_LIVE_ALLOW_GLOBAL_TIMEOUT_WARN: ${{ vars.GG_LIVE_ALLOW_GLOBAL_TIMEOUT_WARN || '0' }}
        run: |
          if [ "${GG_LIVE_ALLOW_GLOBAL_TIMEOUT_WARN}" = "1" ]; then
            npm run gaga:verify-worker-live:local
          else
            npm run gaga:verify-worker-live:strict
          fi
