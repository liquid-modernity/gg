name: Lighthouse CI

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse advisory check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GG_LIVE_BASE_URL: ${{ vars.GG_LIVE_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Lighthouse routes
        run: |
          base_url="${GG_LIVE_BASE_URL:-https://www.pakrpp.com}"
          {
            echo "GG_LIGHTHOUSE_URL_1=${base_url}/"
            echo "GG_LIGHTHOUSE_URL_2=${base_url}/landing"
            echo "GG_LIGHTHOUSE_URL_3=${base_url}/store"
          } >> "$GITHUB_ENV"
          {
            echo "### Lighthouse Scope Truth"
            echo "- Advisory only; this workflow does not deploy."
            echo "- Routes checked:"
            echo "  - ${base_url}/"
            echo "  - ${base_url}/landing"
            echo "  - ${base_url}/store"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run Lighthouse CI
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ env.GG_LIGHTHOUSE_URL_1 }}
            ${{ env.GG_LIGHTHOUSE_URL_2 }}
            ${{ env.GG_LIGHTHOUSE_URL_3 }}
          runs: 1
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Mark Lighthouse as advisory
        run: |
          {
            echo "### Lighthouse Advisory"
            echo "- Lighthouse is non-blocking during vNext development."
            echo "- Failures here do not deploy or publish Blogger templates."
          } >> "$GITHUB_STEP_SUMMARY"
