name: Deploy Worker/Assets to Cloudflare

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      strict_template_parity:
        description: "Hard-fail full public/template smoke"
        required: false
        default: false
        type: boolean
      run_full_public_smoke:
        description: "Run full public/template smoke lane"
        required: false
        default: false
        type: boolean
      release_note:
        description: "Optional release note for workflow summary"
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (manual)
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/checkout@v4

      - name: Checkout (workflow_run head SHA)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Production branch guard
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error title=Production deploy guard::workflow_dispatch must run from main. Current ref: ${GITHUB_REF}."
            exit 1
          fi

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build Blogger publish artifact
        run: npm run gaga:template:pack

      - name: Resolve deploy lanes and expected worker version
        id: deploy_mode
        env:
          INPUT_STRICT_TEMPLATE_PARITY: ${{ github.event.inputs.strict_template_parity || 'false' }}
          INPUT_RUN_FULL_PUBLIC_SMOKE: ${{ github.event.inputs.run_full_public_smoke || 'false' }}
          INPUT_RELEASE_NOTE: ${{ github.event.inputs.release_note || '' }}
        run: |
          expected_worker_version="$(node - <<'NODE'
          const fs = require('node:fs');
          const source = fs.readFileSync('src/worker.js', 'utf8');
          const match = source.match(/const\s+WORKER_VERSION\s*=\s*(['"])([^'"]+)\1/);
          if (!match || !match[2]) process.exit(2);
          process.stdout.write(String(match[2]).trim());
          NODE
          )"
          if [ -z "$expected_worker_version" ]; then
            echo "::error title=Expected worker version missing::Unable to resolve WORKER_VERSION from src/worker.js."
            exit 1
          fi

          template_changed_in_rev=0
          changed_files="$(git show --name-only --pretty='' HEAD || true)"
          if printf '%s\n' "$changed_files" | grep -qx 'index.prod.xml'; then
            template_changed_in_rev=1
          fi

          run_full_public_smoke=0
          full_smoke_hard_fail=0
          lane_reason=""

          if [ "$template_changed_in_rev" = "0" ]; then
            run_full_public_smoke=1
            full_smoke_hard_fail=1
            lane_reason="index.prod.xml unchanged in revision; full public smoke runs as hard gate."
          elif [ "${INPUT_STRICT_TEMPLATE_PARITY}" = "true" ]; then
            run_full_public_smoke=1
            full_smoke_hard_fail=1
            lane_reason="strict_template_parity=true; full public smoke runs as hard gate."
          elif [ "${INPUT_RUN_FULL_PUBLIC_SMOKE}" = "true" ]; then
            run_full_public_smoke=1
            full_smoke_hard_fail=0
            lane_reason="run_full_public_smoke=true; full public smoke runs in warning mode."
          else
            run_full_public_smoke=0
            full_smoke_hard_fail=0
            lane_reason="index.prod.xml changed and Blogger publish is out of scope; full public smoke skipped by design."
          fi

          template_drift_mode="warn"
          if [ "$full_smoke_hard_fail" = "1" ]; then
            template_drift_mode="fail"
          fi

          echo "GG_EXPECTED_WORKER_VERSION=${expected_worker_version}" >> "$GITHUB_ENV"
          echo "GG_WORKER_VERSION_MODE=fail" >> "$GITHUB_ENV"
          echo "GG_TEMPLATE_CHANGED_IN_REV=${template_changed_in_rev}" >> "$GITHUB_ENV"
          echo "GG_RUN_FULL_PUBLIC_SMOKE=${run_full_public_smoke}" >> "$GITHUB_ENV"
          echo "GG_FULL_SMOKE_HARD_FAIL=${full_smoke_hard_fail}" >> "$GITHUB_ENV"
          echo "GG_TEMPLATE_DRIFT_MODE=${template_drift_mode}" >> "$GITHUB_ENV"
          printf 'GG_RELEASE_NOTE<<EOF\n%s\nEOF\n' "${INPUT_RELEASE_NOTE}" >> "$GITHUB_ENV"

          {
            echo "### Deploy Lane Resolution"
            echo "- Expected worker version: \`${expected_worker_version}\`"
            echo "- Template changed in revision: \`${template_changed_in_rev}\`"
            echo "- strict_template_parity: \`${INPUT_STRICT_TEMPLATE_PARITY}\`"
            echo "- run_full_public_smoke: \`${INPUT_RUN_FULL_PUBLIC_SMOKE}\`"
            echo "- Full public smoke lane enabled: \`${run_full_public_smoke}\`"
            echo "- Full public smoke hard gate: \`${full_smoke_hard_fail}\`"
            echo "- Template drift mode: \`${template_drift_mode}\`"
            echo "- Decision: ${lane_reason}"
            if [ -n "${INPUT_RELEASE_NOTE}" ]; then
              echo "- Release note: ${INPUT_RELEASE_NOTE}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate GitHub Actions deploy config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GG_LIVE_BASE_URL: ${{ vars.GG_LIVE_BASE_URL }}
        run: |
          missing=0

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error title=Missing GitHub secret::Set CLOUDFLARE_API_TOKEN before running deploy."
            missing=1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error title=Missing GitHub secret::Set CLOUDFLARE_ACCOUNT_ID before running deploy."
            missing=1
          fi

          if [ -z "${GG_LIVE_BASE_URL:-}" ]; then
            GG_LIVE_BASE_URL="https://www.pakrpp.com"
            echo "::notice title=Missing GitHub variable::GG_LIVE_BASE_URL not set; defaulting live smoke to ${GG_LIVE_BASE_URL}."
          fi

          echo "GG_LIVE_BASE_URL=${GG_LIVE_BASE_URL}" >> "$GITHUB_ENV"

          {
            echo "### Deploy Config"
            echo "- CLOUDFLARE_API_TOKEN configured: \`$([ -n "${CLOUDFLARE_API_TOKEN:-}" ] && echo yes || echo no)\`"
            echo "- CLOUDFLARE_ACCOUNT_ID configured: \`$([ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && echo yes || echo no)\`"
            echo "- GG_LIVE_BASE_URL: \`${GG_LIVE_BASE_URL}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy scope truth
        run: |
          {
            echo "### Deploy Scope Truth"
            echo "- This workflow deploys Cloudflare Worker + Cloudflare static assets."
            echo "- This workflow does **not** publish Blogger template/theme."
            echo "- \\`npm run gaga\\` is a GitHub-first push command, not local Wrangler deploy."
            echo "- Local direct deploy command is \\`npm run gaga:cf:deploy\\`."
            echo "- Worker-scope smoke is always hard-gated after deploy."
            echo "- Full public/template-sensitive smoke is conditional by lane rules."
            echo "- Blogger template manual publish playbook: \\`qa/template-release-playbook.md\\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy Worker/assets via Wrangler
        id: deploy_worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GG_CF_DEPLOY_MAX_ATTEMPTS: "6"
          GG_CF_DEPLOY_BACKOFF_SECONDS: "15"
        run: |
          max_attempts="${GG_CF_DEPLOY_MAX_ATTEMPTS:-6}"
          backoff_seconds="${GG_CF_DEPLOY_BACKOFF_SECONDS:-15}"
          attempt=1
          deploy_ok=0
          log_file_base="$(mktemp -u -t gg-wrangler-deploy.XXXXXX)"

          is_permanent_cf_error() {
            local file="$1"
            grep -Eiq \
              'Authentication error|authorization failed|not authorized|permission denied|Unknown argument|Unknown option|missing entry-point|No such file or directory|Cannot find module|Module not found|Failed to parse|Invalid value|Required.+not provided|is not a valid|CLOUDFLARE_API_TOKEN|CLOUDFLARE_ACCOUNT_ID' \
              "$file"
          }

          while [ "$attempt" -le "$max_attempts" ]; do
            attempt_log="${log_file_base}.attempt-${attempt}.log"
            echo "Cloudflare deploy attempt ${attempt}/${max_attempts}"

            set +e
            npm run gaga:cf:deploy 2>&1 | tee "$attempt_log"
            cmd_status=${PIPESTATUS[0]}
            set -e

            if [ "$cmd_status" -eq 0 ]; then
              deploy_ok=1
              {
                echo "### Cloudflare Deploy"
                echo "- Deploy succeeded on attempt ${attempt}/${max_attempts}."
              } >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            if is_permanent_cf_error "$attempt_log"; then
              echo "::error title=Cloudflare deploy failed::Non-transient Wrangler deploy failure on attempt ${attempt}."
              cat "$attempt_log"
              exit "$cmd_status"
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error title=Cloudflare deploy failed::Retryable Wrangler deploy failure persisted after ${max_attempts} attempts."
              cat "$attempt_log"
              exit "$cmd_status"
            fi

            echo "::warning title=Retrying Wrangler deploy::Attempt ${attempt}/${max_attempts} failed with retryable signal; retrying in ${backoff_seconds}s."
            sleep "$backoff_seconds"
            attempt=$((attempt + 1))
          done

          if [ "$deploy_ok" -ne 1 ]; then
            echo "::error title=Cloudflare deploy failed::Deploy loop exited without success."
            exit 1
          fi

      - name: Worker-scope smoke (hard gate)
        id: worker_smoke
        env:
          GG_LIVE_BASE_URL: ${{ env.GG_LIVE_BASE_URL }}
          GG_EXPECTED_WORKER_VERSION: ${{ env.GG_EXPECTED_WORKER_VERSION }}
          GG_WORKER_VERSION_MODE: fail
          GG_WORKER_SMOKE_MAX_ATTEMPTS: "3"
          GG_WORKER_SMOKE_BACKOFF_SECONDS: "10"
        run: |
          max_attempts="${GG_WORKER_SMOKE_MAX_ATTEMPTS:-3}"
          backoff_seconds="${GG_WORKER_SMOKE_BACKOFF_SECONDS:-10}"
          attempt=1
          smoke_ok=0
          log_file_base="$(mktemp -u -t gg-live-smoke-worker.XXXXXX)"

          while [ "$attempt" -le "$max_attempts" ]; do
            attempt_log="${log_file_base}.attempt-${attempt}.log"
            echo "Worker smoke attempt ${attempt}/${max_attempts}"

            set +e
            bash qa/live-smoke-worker.sh "${GG_LIVE_BASE_URL:-https://www.pakrpp.com}" 2>&1 | tee "$attempt_log"
            cmd_status=${PIPESTATUS[0]}
            set -e

            if [ "$cmd_status" -eq 0 ]; then
              smoke_ok=1
              {
                echo "### Worker-Scope Smoke"
                echo "- Worker-scope smoke passed on attempt ${attempt}/${max_attempts}."
              } >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error title=Worker-scope smoke failed::Worker-scope hard gate failed after ${max_attempts} attempts."
              cat "$attempt_log"
              exit "$cmd_status"
            fi

            echo "::warning title=Retrying worker smoke::Worker-scope smoke failed on attempt ${attempt}/${max_attempts}; retrying in ${backoff_seconds}s."
            sleep "$backoff_seconds"
            attempt=$((attempt + 1))
          done

          if [ "$smoke_ok" -ne 1 ]; then
            echo "::error title=Worker-scope smoke failed::Worker-scope smoke loop exited without success."
            exit 1
          fi

      - name: Install Playwright Chromium (full smoke lane)
        if: ${{ success() }}
        run: |
          if [ "${GG_RUN_FULL_PUBLIC_SMOKE:-0}" != "1" ]; then
            echo "Skipping Playwright install because full public smoke lane is disabled."
            exit 0
          fi
          npx playwright install --with-deps chromium

      - name: Full public/template smoke lane
        id: full_smoke
        if: ${{ success() }}
        env:
          GG_LIVE_BASE_URL: ${{ env.GG_LIVE_BASE_URL }}
          GG_TEMPLATE_DRIFT_MODE: ${{ env.GG_TEMPLATE_DRIFT_MODE }}
          GG_TEMPLATE_CHANGED_IN_REV: ${{ env.GG_TEMPLATE_CHANGED_IN_REV }}
          GG_EXPECTED_WORKER_VERSION: ${{ env.GG_EXPECTED_WORKER_VERSION }}
          GG_WORKER_VERSION_MODE: fail
          GG_WORKER_VERSION_CHECK_PATH: /__gg_worker_ping
          GG_WORKER_ROLLOUT_MAX_ATTEMPTS: "12"
          GG_WORKER_ROLLOUT_BACKOFF_SECONDS: "5"
          GG_DEPLOY_SMOKE_MAX_ATTEMPTS: "2"
          GG_DEPLOY_SMOKE_BACKOFF_SECONDS: "20"
        run: |
          if [ "${GG_RUN_FULL_PUBLIC_SMOKE:-0}" != "1" ]; then
            {
              echo "### Full Public Smoke"
              echo "- Status: skipped"
              echo "- Reason: lane disabled by deploy rules (template change + Blogger publish out of scope)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          max_attempts="${GG_DEPLOY_SMOKE_MAX_ATTEMPTS:-2}"
          backoff_seconds="${GG_DEPLOY_SMOKE_BACKOFF_SECONDS:-20}"
          attempt=1
          smoke_ok=0
          log_file_base="$(mktemp -u -t gg-live-smoke-full.XXXXXX)"
          comments_owner_mode="warn"
          homepage_mixed_mode="warn"

          if [ "${GG_FULL_SMOKE_HARD_FAIL:-0}" = "1" ]; then
            comments_owner_mode="fail"
            homepage_mixed_mode="fail"
          fi

          export GG_COMMENTS_OWNER_BROWSER_MODE="${comments_owner_mode}"
          export GG_HOMEPAGE_MIXED_BROWSER_MODE="${homepage_mixed_mode}"

          {
            echo "### Full Public Smoke Strictness"
            echo "- Template drift mode: \`${GG_TEMPLATE_DRIFT_MODE:-warn}\`"
            echo "- Comments-owner mode: \`${GG_COMMENTS_OWNER_BROWSER_MODE}\`"
            echo "- Homepage-mixed mode: \`${GG_HOMEPAGE_MIXED_BROWSER_MODE}\`"
            echo "- Hard gate mode: \`${GG_FULL_SMOKE_HARD_FAIL:-0}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          while [ "$attempt" -le "$max_attempts" ]; do
            attempt_log="${log_file_base}.attempt-${attempt}.log"
            echo "Full public smoke attempt ${attempt}/${max_attempts}"

            set +e
            bash qa/live-smoke.sh "${GG_LIVE_BASE_URL:-https://www.pakrpp.com}" 2>&1 | tee "$attempt_log"
            cmd_status=${PIPESTATUS[0]}
            set -e

            if [ "$cmd_status" -eq 0 ]; then
              smoke_ok=1
              {
                echo "### Full Public Smoke"
                if [ "${GG_FULL_SMOKE_HARD_FAIL:-0}" = "1" ]; then
                  echo "- Status: passed (hard gate)"
                else
                  echo "- Status: passed (warning mode)"
                fi
                echo "- Attempt: ${attempt}/${max_attempts}"
              } >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              if [ "${GG_FULL_SMOKE_HARD_FAIL:-0}" = "1" ]; then
                echo "::error title=Full public smoke failed::Full public/template smoke hard gate failed after ${max_attempts} attempts."
                cat "$attempt_log"
                exit "$cmd_status"
              fi

              echo "::warning title=Full public smoke warning::Full public/template smoke failed in warning lane after ${max_attempts} attempts."
              {
                echo "### Full Public Smoke"
                echo "- Status: warning (failed in non-hard lane)"
                echo "- Attempts: ${max_attempts}"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            echo "::warning title=Retrying full public smoke::Attempt ${attempt}/${max_attempts} failed; retrying in ${backoff_seconds}s."
            sleep "$backoff_seconds"
            attempt=$((attempt + 1))
          done

          if [ "$smoke_ok" -ne 1 ]; then
            if [ "${GG_FULL_SMOKE_HARD_FAIL:-0}" = "1" ]; then
              echo "::error title=Full public smoke failed::Full smoke loop exited without success in hard lane."
              exit 1
            fi
            echo "::warning title=Full public smoke warning::Full smoke loop exited without success in non-hard lane."
            exit 0
          fi

      - name: Deploy summary truth
        if: always()
        env:
          CI_STATUS: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion || 'manual_dispatch' }}
          DEPLOY_OUTCOME: ${{ steps.deploy_worker.outcome }}
          WORKER_SMOKE_OUTCOME: ${{ steps.worker_smoke.outcome }}
          FULL_SMOKE_OUTCOME: ${{ steps.full_smoke.outcome }}
        run: |
          template_changed="${GG_TEMPLATE_CHANGED_IN_REV:-0}"
          run_full="${GG_RUN_FULL_PUBLIC_SMOKE:-0}"
          full_hard="${GG_FULL_SMOKE_HARD_FAIL:-0}"

          full_public_status="skipped"
          if [ "$run_full" = "1" ]; then
            if [ "$FULL_SMOKE_OUTCOME" = "success" ]; then
              if [ "$full_hard" = "1" ]; then
                full_public_status="passed_hard_gate"
              else
                full_public_status="passed_warning_lane"
              fi
            elif [ "$FULL_SMOKE_OUTCOME" = "failure" ]; then
              if [ "$full_hard" = "1" ]; then
                full_public_status="failed_hard_gate"
              else
                full_public_status="warning_lane_failed"
              fi
            else
              full_public_status="${FULL_SMOKE_OUTCOME:-unknown}"
            fi
          else
            full_public_status="skipped_by_design"
          fi

          blogger_publish_pending="no"
          if [ "$template_changed" = "1" ]; then
            if [ "$run_full" = "1" ] && [ "$full_hard" = "1" ] && [ "$FULL_SMOKE_OUTCOME" = "success" ]; then
              blogger_publish_pending="no"
            else
              blogger_publish_pending="yes"
            fi
          fi

          current_green_meaning="Release failed; inspect hard-gate failures."
          if [ "$DEPLOY_OUTCOME" = "success" ] && [ "$WORKER_SMOKE_OUTCOME" = "success" ]; then
            if [ "$blogger_publish_pending" = "yes" ]; then
              current_green_meaning="Worker release successful, public template parity pending"
            else
              current_green_meaning="Full public parity verified"
            fi
          fi

          {
            echo "### Deploy Summary Truth"
            echo "- CI status: \`${CI_STATUS}\`"
            echo "- Cloudflare deploy status: \`${DEPLOY_OUTCOME:-not_run}\`"
            echo "- Worker rollout/version status: \`${WORKER_SMOKE_OUTCOME:-not_run}\` (expected version: \`${GG_EXPECTED_WORKER_VERSION:-unknown}\`)"
            echo "- Worker-scope smoke status: \`${WORKER_SMOKE_OUTCOME:-not_run}\`"
            echo "- Template changed in revision: \`${template_changed}\`"
            echo "- Full public smoke status: \`${full_public_status}\`"
            echo "- Blogger manual publish pending: \`${blogger_publish_pending}\`"
            echo "- Green meaning: ${current_green_meaning}"
            if [ -n "${GG_RELEASE_NOTE:-}" ]; then
              echo "- Release note: ${GG_RELEASE_NOTE}"
            fi
            echo "- Manual publish playbook: \`qa/template-release-playbook.md\`"
            echo "- Post-publish strict verify: \`npm run gaga:verify-template\`"
            echo "- Workflow guide: \`docs/github-actions-cloudflare.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
