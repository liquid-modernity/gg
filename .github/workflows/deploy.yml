name: Deploy Worker/Assets to Cloudflare

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (manual)
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/checkout@v4

      - name: Checkout (workflow_run head SHA)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install Wrangler CLI (pinned)
        run: npm install --no-save wrangler@4.61.1

      - name: Deploy scope truth
        run: |
          echo "Deploy scope: Cloudflare Worker code + Cloudflare static assets from ./public."
          echo "Not in scope here: Blogger template/theme publish (index.prod.xml) to Blogger admin."
          {
            echo "### Deploy Scope Truth"
            echo "- This workflow deploys Cloudflare Worker + Cloudflare static assets."
            echo "- This workflow does **not** publish Blogger template/theme."
            echo "- Template changes in \`index.prod.xml\` require separate Blogger release."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy via npm run gaga
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run gaga

      - name: Live smoke (public-domain contract)
        env:
          GG_LIVE_BASE_URL: ${{ vars.GG_LIVE_BASE_URL }}
        run: bash qa/live-smoke.sh "${GG_LIVE_BASE_URL:-https://www.pakrpp.com}"
