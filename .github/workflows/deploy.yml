name: Deploy to Cloudflare Workers

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (manual)
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/checkout@v4

      - name: Checkout (workflow_run head SHA)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Quick release sanity
        run: |
          set -euo pipefail
          npm run verify:release
          npm run verify:assets

      - name: Verify P1 for manual deploy
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: npm run verify:p1

      - name: Install Wrangler CLI (pinned)
        run: npm install --no-save wrangler@4.61.1

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: ./node_modules/.bin/wrangler deploy --config wrangler.jsonc

      - name: Strict live gate
        run: bash tools/gate-release-live.sh
