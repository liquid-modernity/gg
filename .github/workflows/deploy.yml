name: Deploy Worker/Assets to Cloudflare

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:
    inputs:
      strict_template_parity:
        description: "Hard-fail deploy when Blogger template parity drifts/missing"
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout (manual)
        if: ${{ github.event_name != 'workflow_run' }}
        uses: actions/checkout@v4

      - name: Checkout (workflow_run head SHA)
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Production branch guard
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error title=Production deploy guard::workflow_dispatch must run from main. Current ref: ${GITHUB_REF}."
            exit 1
          fi

          {
            echo "### Production Branch Guard"
            echo "- Manual production deploy confirmed from \`${GITHUB_REF}\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build Blogger publish artifact
        run: npm run gaga:template:pack

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Wrangler CLI (pinned)
        run: npm install --no-save wrangler@4.61.1

      - name: Resolve deploy verification mode + expected worker version
        env:
          GG_DISPATCH_STRICT_TEMPLATE_PARITY: ${{ github.event.inputs.strict_template_parity || 'false' }}
        run: |
          expected_worker_version="$(node - <<'NODE'
          const fs = require('node:fs');
          const source = fs.readFileSync('src/worker.js', 'utf8');
          const match = source.match(/const\s+WORKER_VERSION\s*=\s*(['"])([^'"]+)\1/);
          if (!match || !match[2]) process.exit(2);
          process.stdout.write(String(match[2]).trim());
          NODE
          )"
          if [ -z "$expected_worker_version" ]; then
            echo "Unable to resolve WORKER_VERSION from src/worker.js" >&2
            exit 1
          fi

          template_mode="warn"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${GG_DISPATCH_STRICT_TEMPLATE_PARITY}" = "true" ]; then
            template_mode="fail"
          fi

          echo "GG_EXPECTED_WORKER_VERSION=$expected_worker_version" >> "$GITHUB_ENV"
          echo "GG_WORKER_VERSION_MODE=fail" >> "$GITHUB_ENV"
          echo "GG_TEMPLATE_DRIFT_MODE=$template_mode" >> "$GITHUB_ENV"

          {
            echo "### Deploy Verification Mode"
            echo "- Expected worker version: \`$expected_worker_version\`"
            echo "- Worker rollout gate mode: \`fail\`"
            echo "- Template drift mode: \`$template_mode\`"
            echo "- Strict template parity input: \`${GG_DISPATCH_STRICT_TEMPLATE_PARITY}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate GitHub Actions deploy config
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GG_LIVE_BASE_URL: ${{ vars.GG_LIVE_BASE_URL }}
        run: |
          missing=0

          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error title=Missing GitHub secret::Set CLOUDFLARE_API_TOKEN before running deploy."
            missing=1
          fi

          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error title=Missing GitHub secret::Set CLOUDFLARE_ACCOUNT_ID before running deploy."
            missing=1
          fi

          if [ -z "${GG_LIVE_BASE_URL:-}" ]; then
            GG_LIVE_BASE_URL="https://www.pakrpp.com"
            echo "::notice title=Missing GitHub variable::GG_LIVE_BASE_URL not set; defaulting live smoke to ${GG_LIVE_BASE_URL}."
          fi

          echo "GG_LIVE_BASE_URL=${GG_LIVE_BASE_URL}" >> "$GITHUB_ENV"

          {
            echo "### GitHub Actions Deploy Config"
            echo "- CLOUDFLARE_API_TOKEN configured: \`$([ -n "${CLOUDFLARE_API_TOKEN:-}" ] && echo yes || echo no)\`"
            echo "- CLOUDFLARE_ACCOUNT_ID configured: \`$([ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && echo yes || echo no)\`"
            echo "- GG_LIVE_BASE_URL: \`${GG_LIVE_BASE_URL}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy scope truth
        run: |
          echo "Deploy scope: Cloudflare Worker code + Cloudflare static assets from ./public."
          echo "Not in scope here: Blogger template/theme publish (index.prod.xml) to Blogger admin."
          {
            echo "### Deploy Scope Truth"
            echo "- This workflow deploys Cloudflare Worker + Cloudflare static assets."
            echo "- This workflow does **not** publish Blogger template/theme."
            echo "- Template changes in \`index.prod.xml\` require separate Blogger release."
            echo "- Manual publish checklist: \`qa/template-release-playbook.md\`"
            echo "- Post-publish verification command: \`npm run gaga:verify-template\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Template release guard (index.prod.xml)
        run: |
          repo_template_fp="$(node qa/template-fingerprint.mjs --value 2>/dev/null || true)"
          changed_files="$(git show --name-only --pretty='' HEAD || true)"
          if printf '%s\n' "$changed_files" | grep -qx 'index.prod.xml'; then
            echo "GG_TEMPLATE_CHANGED_IN_REV=1" >> "$GITHUB_ENV"
            echo "::warning title=Blogger template not deployed::index.prod.xml changed in this revision, but this workflow deploys Worker/assets only."
            {
              echo "### Template Release Guard"
              echo "- \`index.prod.xml\` changed in this deployed revision."
              echo "- Repo template fingerprint (expected): \`${repo_template_fp:-unknown}\`"
              echo "- No Blogger template/theme publish is performed by this workflow."
              echo "- Template behavior on public production can remain out-of-band until Blogger publish is done."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "GG_TEMPLATE_CHANGED_IN_REV=0" >> "$GITHUB_ENV"
            {
              echo "### Template Release Guard"
              echo "- \`index.prod.xml\` not changed in this revision."
              echo "- Repo template fingerprint (expected): \`${repo_template_fp:-unknown}\`"
              echo "- Workflow scope remains Worker/assets only."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Deploy via npm run gaga
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run gaga

      - name: Live smoke (version-aware worker contract + template state)
        env:
          GG_LIVE_BASE_URL: ${{ env.GG_LIVE_BASE_URL }}
          GG_TEMPLATE_DRIFT_MODE: ${{ env.GG_TEMPLATE_DRIFT_MODE }}
          GG_EXPECTED_WORKER_VERSION: ${{ env.GG_EXPECTED_WORKER_VERSION }}
          GG_WORKER_VERSION_MODE: ${{ env.GG_WORKER_VERSION_MODE }}
          GG_COMMENTS_OWNER_BROWSER_MODE: fail
          GG_WORKER_VERSION_CHECK_PATH: /__gg_worker_ping
          GG_WORKER_ROLLOUT_MAX_ATTEMPTS: "12"
          GG_WORKER_ROLLOUT_BACKOFF_SECONDS: "5"
        run: bash qa/live-smoke.sh "${GG_LIVE_BASE_URL:-https://www.pakrpp.com}"

      - name: Manual Blogger publish reminder
        if: always()
        env:
          GG_LIVE_BASE_URL: ${{ env.GG_LIVE_BASE_URL }}
        run: |
          {
            echo "### Manual Blogger Template Publish"
            echo "- This pipeline has deployed Worker/assets only."
            echo "- Template source of truth: \`index.prod.xml\`"
            echo "- Publish checklist: \`qa/template-release-playbook.md\`"
            echo "- Fingerprint status check: \`npm run gaga:template:status -- ${GG_LIVE_BASE_URL:-https://www.pakrpp.com}\`"
            echo "- Full post-publish verification: \`npm run gaga:verify-template\`"
            echo "- Deploy run template drift mode: \`${GG_TEMPLATE_DRIFT_MODE:-warn}\`"
            echo "- Expected worker version for this deploy: \`${GG_EXPECTED_WORKER_VERSION:-unknown}\`"
            echo "- GitHub Actions setup guide: \`docs/github-actions-cloudflare.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
